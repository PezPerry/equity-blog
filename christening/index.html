<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A little celebration — join us for the Christening on Sunday the 12th at Berkeley Castle.">
<title>The Christening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2a28;
    --paper:#fbf8f3;
    --paper-2:#f4eee3;
    --sage:#6f7d68;
    --sage-deep:#4f5c49;
    --gold:#b08d57;
    --blush:#c98b7a;
    --muted:#8a827a;
    --rule:rgba(43,42,40,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter Tight',-apple-system,BlinkMacSystemFont,sans-serif;
    font-size:18px;line-height:1.65;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }
  a{color:inherit}
  ::selection{background:var(--sage);color:var(--paper)}

  header.site{
    border-bottom:1px solid var(--rule);
    background:rgba(251,248,243,0.9);
    backdrop-filter:blur(6px);
    position:sticky;top:0;z-index:10;
  }
  .site-inner{
    max-width:820px;margin:0 auto;padding:18px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .brand{
    font-family:'Cormorant Garamond',serif;
    font-size:1.35rem;font-weight:600;letter-spacing:0.02em;text-decoration:none;
  }
  nav.site a{
    text-decoration:none;color:var(--muted);
    font-size:0.82rem;letter-spacing:0.14em;text-transform:uppercase;
    margin-left:22px;transition:color .2s;
  }
  nav.site a:hover{color:var(--ink)}
  nav.site a.active{color:var(--sage-deep);font-weight:500}

  .hero{
    max-width:820px;margin:0 auto;padding:96px 24px 60px;text-align:center;
  }
  .kicker{
    font-size:0.78rem;letter-spacing:0.28em;text-transform:uppercase;
    color:var(--gold);margin-bottom:20px;
  }
  .hero h1{
    font-family:'Cormorant Garamond',serif;font-weight:500;
    font-size:clamp(3rem,9vw,5.4rem);line-height:1;letter-spacing:0.01em;
  }
  .hero .deck{
    color:var(--muted);font-size:1.12rem;margin-top:20px;font-weight:300;
    max-width:520px;margin-left:auto;margin-right:auto;
  }
  .flourish{width:64px;height:1px;background:var(--gold);margin:34px auto 0;position:relative}
  .flourish::before{
    content:"❧";position:absolute;top:-13px;left:50%;transform:translateX(-50%);
    background:var(--paper);padding:0 10px;color:var(--gold);font-size:1rem;
  }

  .facts{
    max-width:820px;margin:0 auto;padding:10px 24px 20px;
    display:grid;grid-template-columns:repeat(3,1fr);gap:18px;
  }
  .fact{
    background:var(--paper-2);border:1px solid var(--rule);border-radius:14px;
    padding:26px 20px;text-align:center;
  }
  .fact .l{
    font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;
    color:var(--gold);margin-bottom:10px;
  }
  .fact .v{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:500;line-height:1.2}
  @media(max-width:640px){.facts{grid-template-columns:1fr}}

  .cta{max-width:820px;margin:0 auto;padding:36px 24px 10px;text-align:center}
  .cta a{
    display:inline-block;text-decoration:none;
    background:var(--sage-deep);color:var(--paper);
    padding:14px 34px;border-radius:999px;
    font-size:0.82rem;letter-spacing:0.16em;text-transform:uppercase;
    transition:background .2s;
  }
  .cta a:hover{background:var(--sage)}

  footer{text-align:center;padding:56px 24px 60px;color:var(--muted);font-size:0.85rem}
  footer .flourish{margin-bottom:18px}
</style>
</head>
<body>

<header class="site">
  <div class="site-inner">
    <a class="brand" href="index.html">The Christening</a>
    <nav class="site">
      <a href="index.html" class="active">Home</a>
      <a href="schedule.html">Schedule</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="kicker">Please join us</div>
  <h1>The Christening</h1>
  <p class="deck">A weekend together to celebrate a very special day — with family, food, and a little wandering in between.</p>
  <div class="flourish"></div>
</section>

<section class="facts">
  <div class="fact">
    <div class="l">When</div>
    <div class="v">Sunday<br>the 12th</div>
  </div>
  <div class="fact">
    <div class="l">Service</div>
    <div class="v">11:00 am</div>
  </div>
  <div class="fact">
    <div class="l">Where</div>
    <div class="v">Berkeley<br>Castle</div>
  </div>
</section>

<section class="cta">
  <a href="schedule.html">View the full schedule →</a>
</section>

<footer>
  <div class="flourish"></div>
  With love, for a very special day.
</footer>

</body>
</html>
