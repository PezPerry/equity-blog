<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz@144&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --navy: #0f1419;
            --navy-2: #1a2028;
            --cream: #f5f1ea;
            --cream-2: #eae3d6;
            --cream-3: #d9d0be;
            --accent: #a5321c;
            --gold: #b8923a;
            --muted: #5a6370;
            --rule: rgba(15,20,25,0.14);
            --rule-strong: rgba(15,20,25,0.28);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--cream);
            color: var(--navy);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        ::selection {
            background: var(--accent);
            color: var(--cream);
        }

        /* Masthead / Fixed Top Bar */
        .masthead {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--cream);
            mix-blend-mode: difference;
            background: transparent;
            z-index: 1000;
            pointer-events: none;
        }

        .masthead-left,
        .masthead-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
        }

        /* Header / Hero Section */
        .header {
            background-color: var(--navy);
            color: white;
            padding: 120px 32px 64px;
            position: relative;
            margin-top: 48px;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header h1 {
            font-family: 'Fraunces', serif;
            font-size: 64px;
            font-weight: 400;
            font-variation-settings: "opsz" 144;
            line-height: 1.1;
            margin-bottom: 24px;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--cream-3);
        }

        .italic-gold {
            font-style: italic;
            color: var(--gold);
        }

        /* Controls Section */
        .controls-section {
            background-color: var(--cream);
            border-top: 1px solid var(--rule);
            padding: 24px 32px;
            position: sticky;
            top: 48px;
            z-index: 50;
        }

        .control-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        .control-group label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
        }

        .date-buttons,
        .nav-arrows {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            background: var(--cream);
            color: var(--navy);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter Tight', sans-serif;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .btn:hover {
            border-bottom-color: var(--muted);
        }

        .btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .nav-arrows button {
            padding: 8px 12px;
            font-size: 14px;
            width: auto;
            height: auto;
            border: none;
            background: transparent;
        }

        input[type="date"],
        input[type="text"] {
            padding: 10px 12px;
            border: none;
            border-bottom: 1px solid var(--rule);
            background: transparent;
            font-size: 13px;
            font-family: 'Inter Tight', sans-serif;
            color: var(--navy);
            transition: border-color 0.2s;
        }

        input[type="date"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-bottom-color: var(--accent);
        }

        input[type="text"]::placeholder {
            color: var(--muted);
        }

        .category-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 8px 14px;
            border: none;
            border-left: 3px solid transparent;
            background: var(--cream);
            color: var(--muted);
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .chip:hover {
            color: var(--navy);
        }

        .chip.active {
            color: var(--navy);
        }

        .chip[data-category="AGM"],
        .chip[data-category="EGM"],
        .chip[data-category="GM"] {
            border-left-color: var(--navy-2);
        }

        .chip[data-category="AGM"].active,
        .chip[data-category="EGM"].active,
        .chip[data-category="GM"].active {
            background: rgba(26,32,40,0.06);
        }

        .chip[data-category="Final Results"],
        .chip[data-category="Interim Results"],
        .chip[data-category="Q1 Results"],
        .chip[data-category="Q3 Results"],
        .chip[data-category="Q4 Results"] {
            border-left-color: var(--accent);
        }

        .chip[data-category="Final Results"].active,
        .chip[data-category="Interim Results"].active,
        .chip[data-category="Q1 Results"].active,
        .chip[data-category="Q3 Results"].active,
        .chip[data-category="Q4 Results"].active {
            background: rgba(165,50,28,0.06);
        }

        .chip[data-category*="Dividend Payment"] {
            border-left-color: var(--gold);
        }

        .chip[data-category*="Dividend Payment"].active {
            background: rgba(184,146,58,0.06);
        }

        .chip[data-category*="Ex-Dividend"] {
            border-left-color: var(--cream-3);
        }

        .chip[data-category*="Ex-Dividend"].active {
            background: rgba(217,208,190,0.08);
        }

        .chip[data-category="Trading Announcement"] {
            border-left-color: var(--muted);
        }

        .chip[data-category="Trading Announcement"].active {
            background: rgba(90,99,112,0.06);
        }

        .chip[data-category="Annual Report"],
        .chip[data-category="Drilling Report"] {
            border-left-color: var(--cream-2);
        }

        .chip[data-category="Annual Report"].active,
        .chip[data-category="Drilling Report"].active {
            background: rgba(234,227,214,0.08);
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-switch label {
            cursor: pointer;
            font-family: 'Inter Tight', sans-serif;
            font-size: 13px;
            text-transform: none;
            letter-spacing: normal;
        }

        /* Calendar Export Buttons */
        .calendar-buttons {
            display: flex;
            gap: 8px;
        }

        .cal-btn {
            padding: 8px 14px;
            border: 1px solid var(--rule-strong) !important;
            background: var(--cream) !important;
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 11px !important;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--navy);
            cursor: pointer;
            transition: all 0.2s;
        }

        .cal-btn:hover {
            background: var(--navy) !important;
            color: var(--cream);
            border-color: var(--navy) !important;
        }

        /* Content Section */
        .content-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 32px;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 48px;
        }

        .stats-number {
            font-family: 'Fraunces', serif;
            font-size: 56px;
            font-weight: 400;
            font-variation-settings: "opsz" 144;
            color: var(--navy);
        }

        .stats-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* Table Styling */
        .table-container {
            background: var(--cream);
            border-top: 1px solid var(--rule-strong);
            overflow: hidden;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--cream);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 16px 0;
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--muted);
            border-bottom: 1px solid var(--rule-strong);
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }

        th:hover {
            color: var(--navy);
        }

        th.sortable::after {
            content: ' ⇅';
            opacity: 0.4;
        }

        th.sort-asc::after {
            content: ' ↑';
            opacity: 1;
        }

        th.sort-desc::after {
            content: ' ↓';
            opacity: 1;
        }

        td {
            padding: 16px 0;
            border-bottom: 1px solid var(--rule);
            font-size: 15px;
            font-family: 'Inter Tight', sans-serif;
        }

        tbody tr {
            background-color: transparent;
            transition: background-color 0.15s;
        }

        tbody tr:hover {
            background-color: rgba(165,50,28,0.02);
        }

        .ticker {
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
            font-size: 13px;
        }

        .company-name {
            color: var(--navy);
        }

        /* Category Tags */
        .category-tag {
            display: inline-block;
            padding: 6px 10px;
            border-left: 3px solid transparent;
            background: transparent;
            font-size: 11px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--navy);
        }

        .tag-agm {
            border-left-color: var(--navy-2);
            background: rgba(26,32,40,0.06);
        }

        .tag-results {
            border-left-color: var(--accent);
            background: rgba(165,50,28,0.06);
        }

        .tag-dividend {
            border-left-color: var(--gold);
            background: rgba(184,146,58,0.06);
        }

        .tag-ex-dividend {
            border-left-color: var(--cream-3);
            background: rgba(217,208,190,0.08);
        }

        .tag-trading {
            border-left-color: var(--muted);
            background: rgba(90,99,112,0.06);
        }

        .tag-report {
            border-left-color: var(--cream-2);
            background: rgba(234,227,214,0.08);
        }

        .tag-special {
            border-left-color: var(--accent);
            background: rgba(165,50,28,0.06);
        }

        /* Category Group Headers */
        .category-group-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-top: 48px;
            margin-bottom: 24px;
        }

        .category-group-header .number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .category-group-header h2 {
            font-family: 'Fraunces', serif;
            font-size: 42px;
            font-weight: 400;
            font-variation-settings: "opsz" 144;
            color: var(--navy);
        }

        .empty-state {
            padding: 48px 0;
            text-align: center;
            color: var(--muted);
        }

        .empty-state p {
            font-size: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .masthead {
                padding: 0 16px;
                flex-direction: column;
                height: auto;
                gap: 8px;
            }

            .masthead-left,
            .masthead-right {
                width: 100%;
                justify-content: space-between;
            }

            .header {
                padding: 80px 16px 48px;
            }

            .header h1 {
                font-size: 40px;
            }

            .controls-section {
                padding: 16px;
                top: auto;
            }

            .control-group {
                gap: 12px;
            }

            .content-section {
                padding: 24px 16px;
            }

            th, td {
                padding: 12px 0;
                font-size: 13px;
            }

            .category-filters {
                gap: 6px;
            }

            .chip {
                padding: 6px 10px;
                font-size: 10px;
            }

            .stats-number {
                font-size: 40px;
            }

            .category-group-header h2 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- Masthead -->
    <div class="masthead">
        <div class="masthead-left">
            <span class="dot"></span>
            <span id="mastheadDate">FINANCIAL CALENDAR / --.--.--</span>
        </div>
        <div class="masthead-right">
            ROLLING MARKET CALENDAR
        </div>
    </div>

    <!-- Header / Hero -->
    <div class="header">
        <div class="header-content">
            <h1>Financial <span class="italic-gold">Calendar</span></h1>
            <div class="header-meta">
                <span class="dot"></span>
                Rolling Market Events & Corporate Calendar
            </div>
        </div>
    </div>

    <!-- Controls Section -->
    <div class="controls-section">
        <div class="control-group">
            <label>View:</label>
            <div class="date-buttons">
                <button class="btn" data-view="today">Today</button>
                <button class="btn" data-view="week">This Week</button>
                <button class="btn" data-view="month">This Month</button>
                <button class="btn active" data-view="all">All Upcoming</button>
            </div>
            <div class="nav-arrows">
                <button class="btn" id="prevDay" title="Previous day">&laquo;</button>
                <button class="btn" id="nextDay" title="Next day">&raquo;</button>
            </div>
        </div>

        <div class="control-group">
            <label>From:</label>
            <input type="date" id="dateFrom">
            <label>To:</label>
            <input type="date" id="dateTo">
        </div>

        <div class="control-group">
            <label>Search:</label>
            <input type="text" id="searchBox" placeholder="Company name or ticker...">
        </div>

        <div class="control-group">
            <label>Categories:</label>
            <div class="category-filters" id="categoryFilters"></div>
        </div>

        <div class="control-group">
            <div class="toggle-switch">
                <input type="checkbox" id="groupByCategory">
                <label for="groupByCategory">Group by Category</label>
            </div>
        </div>

        <div class="control-group">
            <label>Add to Calendar:</label>
            <div class="calendar-buttons">
                <button class="btn cal-btn" id="exportICS" title="Download .ics file for Apple Calendar / iOS">iOS Calendar</button>
                <button class="btn cal-btn" id="exportGoogle" title="Download .csv for Google Calendar import">Gmail Calendar</button>
                <button class="btn cal-btn" id="exportOutlook" title="Download .ics file for Outlook">Outlook Calendar</button>
            </div>
        </div>

        <div class="control-group">
            <label>Download Spreadsheet:</label>
            <div class="calendar-buttons">
                <button class="btn cal-btn" id="exportExcel" title="Download Excel spreadsheet of watchlist events" style="background:var(--accent);color:var(--cream);border-color:var(--accent);">Download Excel (.xlsx)</button>
            </div>
        </div>
    </div>

    <!-- Content Section -->
    <div class="content-section">
        <div class="stats-bar">
            <div class="stats-number" id="eventCount">0</div>
            <div class="stats-label">Events</div>
        </div>

        <div class="table-container">
            <div class="table-wrapper">
                <table id="eventsTable">
                    <thead>
                        <tr>
                            <th class="sortable" data-column="date">Date</th>
                            <th class="sortable" data-column="ticker">Ticker</th>
                            <th class="sortable" data-column="company">Company</th>
                            <th class="sortable" data-column="category">Event Category</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
            <div class="empty-state" id="emptyState" style="display:none;">
                <p>No events match your filters.</p>
            </div>
        </div>
    </div>

        (function() {

        // Date inputs initialized via updateDateRange() call at end of script

        function getCategoryTag(category) {
            if (['AGM', 'EGM', 'GM'].includes(category)) return 'tag-agm';
            if (['Final Results', 'Interim Results', 'Q1 Results', 'Q2 Results', 'Q3 Results', 'Q4 Results'].includes(category)) return 'tag-results';
            if (['Final Dividend Payment Date', 'Interim Dividend Payment Date', 'Quarterly Dividend Payment Date', 'Special Dividend Payment Date'].includes(category)) return 'tag-dividend';
            if (category.includes('Ex-Dividend')) return 'tag-ex-dividend';
            if (category === 'Trading Announcement') return 'tag-trading';
            if (['Annual Report', 'Drilling Report'].includes(category)) return 'tag-report';
            if (category === 'Special Dividend Payment Date' || category === 'Special Ex-Dividend Date') return 'tag-special';
            return 'tag-report';
        }

        function parseDate(dateStr) {
            const parts = dateStr.split('-');
            return new Date(parseInt(parts[2]), monthMap[parts[1]], parseInt(parts[0]));
        }

        function getFilteredEvents() {
            let filtered = events.filter(e => {
                if (!activeCategories.has(e.category)) return false;

                const search = document.getElementById('searchBox').value.toLowerCase();
                if (search && !e.company.toLowerCase().includes(search) && !e.ticker.toLowerCase().includes(search)) {
                    return false;
                }

                const dfParts = document.getElementById('dateFrom').value.split('-');
                const dtParts = document.getElementById('dateTo').value.split('-');
                const dateFrom = new Date(parseInt(dfParts[0]), parseInt(dfParts[1])-1, parseInt(dfParts[2]));
                const dateTo = new Date(parseInt(dtParts[0]), parseInt(dtParts[1])-1, parseInt(dtParts[2]));
                if (e.dateObj < dateFrom || e.dateObj > dateTo) return false;

                return true;
            });

            filtered.sort((a, b) => {
                let aVal, bVal;
                if (sortColumn === 'date') {
                    aVal = a.dateObj;
                    bVal = b.dateObj;
                } else if (sortColumn === 'company') {
                    aVal = a.company.toLowerCase();
                    bVal = b.company.toLowerCase();
                } else if (sortColumn === 'ticker') {
                    aVal = a.ticker.toLowerCase();
                    bVal = b.ticker.toLowerCase();
                } else {
                    aVal = a.category.toLowerCase();
                    bVal = b.category.toLowerCase();
                }

                if (aVal < bVal) return sortDir === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortDir === 'asc' ? 1 : -1;
                return 0;
            });

            return filtered;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const countEl = document.getElementById('eventCount');

            const filtered = getFilteredEvents();
            countEl.textContent = filtered.length;

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            const groupByCategory = document.getElementById('groupByCategory').checked;

            if (groupByCategory) {
                const grouped = {};
                filtered.forEach(e => {
                    if (!grouped[e.category]) grouped[e.category] = [];
                    grouped[e.category].push(e);
                });

                tbody.innerHTML = '';
                let groupIndex = 0;
                Object.keys(grouped).sort().forEach(cat => {
                    groupIndex++;
                    const headerRow = document.createElement('tr');
                    headerRow.innerHTML = `<td colspan="4" style="padding: 32px 0 16px 0; border: none;">
                        <div class="category-group-header">
                            <span class="number">0${groupIndex}</span>
                            <h2>${cat}</h2>
                        </div>
                    </td>`;
                    tbody.appendChild(headerRow);

                    grouped[cat].forEach(e => {
                        const row = document.createElement('tr');
                        const dateStr = e.date;
                        row.innerHTML = `
                            <td>${dateStr}</td>
                            <td class="ticker">${e.ticker}</td>
                            <td class="company-name">${e.company}</td>
                            <td><span class="category-tag ${getCategoryTag(e.category)}">${e.category}</span></td>
                        `;
                        tbody.appendChild(row);
                    });
                });
            } else {
                tbody.innerHTML = filtered.map(e => `
                    <tr>
                        <td>${e.date}</td>
                        <td class="ticker">${e.ticker}</td>
                        <td class="company-name">${e.company}</td>
                        <td><span class="category-tag ${getCategoryTag(e.category)}">${e.category}</span></td>
                    </tr>
                `).join('');
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoryFilters');
            container.innerHTML = allCategories.map(cat => `
                <div class="chip active" data-category="${cat}">${cat}</div>
            `).join('');

            container.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const cat = chip.dataset.category;
                    if (activeCategories.has(cat)) {
                        activeCategories.delete(cat);
                        chip.classList.remove('active');
                    } else {
                        activeCategories.add(cat);
                        chip.classList.add('active');
                    }
                    renderTable();
                });
            });
        }

        function updateDateRange() {
            const dateFrom = document.getElementById('dateFrom');
            const dateTo = document.getElementById('dateTo');

            if (currentView === 'today') {
                const y = currentDate.getFullYear();
                const m = String(currentDate.getMonth() + 1).padStart(2, '0');
                const d = String(currentDate.getDate()).padStart(2, '0');
                const dateStr = `${y}-${m}-${d}`;
                dateFrom.value = dateStr;
                dateTo.value = dateStr;
            } else if (currentView === 'week') {
                const start = new Date(currentDate);
                start.setDate(start.getDate() - start.getDay());
                const end = new Date(start);
                end.setDate(end.getDate() + 6);
                dateFrom.value = start.toISOString().split('T')[0];
                dateTo.value = end.toISOString().split('T')[0];
            } else if (currentView === 'month') {
                const now = new Date();
                const first = new Date(now.getFullYear(), now.getMonth(), 1);
                const last = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                const pad = n => String(n).padStart(2, '0');
                dateFrom.value = `${first.getFullYear()}-${pad(first.getMonth()+1)}-${pad(first.getDate())}`;
                dateTo.value = `${last.getFullYear()}-${pad(last.getMonth()+1)}-${pad(last.getDate())}`;
            } else if (currentView === 'all') {
                const ds = events.map(e => e.dateObj).sort((a, b) => a - b);
                const pad = n => String(n).padStart(2, '0');
                const f = ds[0], l = ds[ds.length - 1];
                dateFrom.value = `${f.getFullYear()}-${pad(f.getMonth()+1)}-${pad(f.getDate())}`;
                dateTo.value = `${l.getFullYear()}-${pad(l.getMonth()+1)}-${pad(l.getDate())}`;
            }

            renderTable();
        }

        document.querySelectorAll('[data-view]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                updateDateRange();

        document.getElementById('prevDay').addEventListener('click', () => {

        document.getElementById('nextDay').addEventListener('click', () => {

        document.querySelectorAll('th.sortable').forEach(th => {

                renderTable();
            });
        });

        // Calendar Export Functions
        function parseDateForCal(dateStr) {
            const parts = dateStr.split('-');
            const months = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
            return {y: parts[2], m: months[parts[1]], d: parts[0].padStart(2,'0')};
        }

        function generateICS(filtered, filename) {
            let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Financial Calendar//EN\r\nCALSCALE:GREGORIAN\r\n';
            filtered.forEach(e => {
                const dt = parseDateForCal(e.date);
                const dateVal = `${dt.y}${dt.m}${dt.d}`;
                const uid = `${dateVal}-${e.ticker}-${e.category.replace(/\s/g,'')}@financialcalendar`;
                ics += 'BEGIN:VEVENT\r\n';
                ics += `DTSTART;VALUE=DATE:${dateVal}\r\n`;
                ics += `DTEND;VALUE=DATE:${dateVal}\r\n`;
                ics += `SUMMARY:${e.ticker} — ${e.category}\r\n`;
                ics += `DESCRIPTION:${e.company} (${e.ticker}) — ${e.category}\\nDate: ${e.date}\r\n`;
                ics += `UID:${uid}\r\n`;
                ics += 'END:VEVENT\r\n';
            });
            ics += 'END:VCALENDAR';

            const blob = new Blob([ics], {type: 'text/calendar;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function generateGoogleCSV(filtered) {
            let csv = 'Subject,Start Date,All Day Event,Description\r\n';
            filtered.forEach(e => {
                const dt = parseDateForCal(e.date);
                const startDate = `${dt.m}/${dt.d}/${dt.y}`;
                const subject = `${e.ticker} — ${e.category}`.replace(/"/g, '""');
                const desc = `${e.company} (${e.ticker}) — ${e.category}`.replace(/"/g, '""');
                csv += `"${subject}","${startDate}","True","${desc}"\r\n`;
            });

            const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Financial_Calendar_Google_Calendar.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        document.getElementById('exportICS').addEventListener('click', () => {
            const filtered = getFilteredEvents();
            if (filtered.length === 0) { alert('No events to export. Adjust your filters.'); return; }
            generateICS(filtered, 'Financial_Calendar_iOS.ics');

        document.getElementById('exportGoogle').addEventListener('click', () => {
            const filtered = getFilteredEvents();

        });

        // Watchlist tickers for filtered Excel download
        const watchlistTickers = new Set(['FOUR','AAS','ABDN','API','ADM','ADBE','AJB','GOOGL','AMZN','AAL','ANTO','AO.','AAPL','ASHM','AHT','ASC','ABF','AML','ATG','BAB','BBY','BARC','BAG','BTRW','BEZ','BWY','BKG','BHP','BYG','DEBS','BP.','BPT','BLND','BT.A','BRBY','CRN','CMCL','CNE','CARD','CCL','CSN','CKN','CBG','CLI','CMCX','CME','CPG','BBCP','ROAD','COST','CACC','CRST','CRDA','CURY','CREI','DAL','DAR','DLN','DFS','DGE','DOM','DGICA','DMLP','DBX','DNLM','EZJ','EBAY','ESP','ESNT','EXPN','FXPO','FEVR','FCFS','FGP','FORT','FOXT','FRAN','FRAS','GFRD','GLPI','GLEN','GLV','GLNG','GSHD','GSF','GRI','GLDD','GPE','GGP','GRG','HFD','HMSO','HBR','HWG','HLCL','HPK','HILS','HFG','HSX','HOC','BOWL','HWDN','HSBA','HTG','IBST','ICG','IGG','INDI','IHP','INTC','IBKR','IHG','IAG','IWG','ISRG','INVP','IPO','JHD','JD.','JD','JET2','JMAT','JSG','JLP','JUST','KLR','KMR','KIE','KGF','LRE','LAND','LEGH','LGEN','LGIH','BGEO','LQDT','LLOY','LMP','LSL','MNG','EMG','MKS','MSLH','MTLS','MEGP','MRO','META','MSFT','MAB','GLE','MCG','MHK','MONY','MOON','MGNS','MAB1','MOTR','MTVW','MYRG','WINE','NWG','NFLX','NXT','N91','NVDA','OCDO','OMU','OTB','LPRO','ORGN','OSB','PAF','PAG','PYPL','PAY','PSN','PETS','PTEC','PLUS','PPH','PFD','PHP','PRU','RAT','RNWH','RTO','RHIM','RCDO','RIO','RR.','SUS','SAFE','SBRY','SAVE','SVS','SERE','SOI','SDR','SGRO','SRP','SHC','SHEL','SRE','SLM','SSPG','STJ','STAN','SDLF','SBUX','STLD','SUPR','SLP','TSM','THRL','TKO','TATE','TW.','TBCG','TSCO','GYM','TRC','THG','TPT','TXP','TRN','TPK','TRB','BBOX','TRVG','TRST','TLW','ULVR','UTG','URI','ULH','VTU','VIC','VCT','VTY','VOD','WHR','WMG','WOSG','JDW','SMWH','WTB','WIX','WIZZ','WKP','WYNN','YCA','ZIG']);

        document.getElementById('exportExcel').addEventListener('click', () => {
            if (typeof XLSX === 'undefined') { alert('Excel library still loading, please try again in a moment.'); return; }
            const watchlistEvents = events.filter(e => watchlistTickers.has(e.ticker));
            if (watchlistEvents.length === 0) { alert('No watchlist events found.'); return; }
            const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const matchedTickers = [...new Set(watchlistEvents.map(e => e.ticker))].sort();

            const evData = [
                ['LSE Financial Calendar - June 2026 (My Watchlist)'],
                [watchlistEvents.length + ' Events from ' + matchedTickers.length + ' tracked companies | Generated ' + new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'})],
                [],
                ['Date', 'Day', 'Company', 'Ticker', 'Category']
            ];
            watchlistEvents.forEach(ev => evData.push([ev.date, dayNames[ev.dateObj.getDay()], ev.company, ev.ticker, ev.category]));

            const catCounts = {};
            watchlistEvents.forEach(ev => { catCounts[ev.category] = (catCounts[ev.category] || 0) + 1; });
            const sorted = Object.entries(catCounts).sort((a,b) => b[1] - a[1]);
            const sumData = [['June 2026 - My Watchlist Summary'],[],['Category','Count','% of Total']];
            sorted.forEach(([cat,count]) => sumData.push([cat, count, (count/watchlistEvents.length*100).toFixed(1)+'%']));
            sumData.push(['TOTAL', watchlistEvents.length, '100.0%']);

            const wb = XLSX.utils.book_new();
            const ws1 = XLSX.utils.aoa_to_sheet(evData);
            ws1['!cols'] = [{wch:15},{wch:12},{wch:42},{wch:10},{wch:36}];
            XLSX.utils.book_append_sheet(wb, ws1, 'My Watchlist');
            const ws2 = XLSX.utils.aoa_to_sheet(sumData);
            ws2['!cols'] = [{wch:38},{wch:12},{wch:14}];
            XLSX.utils.book_append_sheet(wb, ws2, 'Summary');
            XLSX.writeFile(wb, 'Financial_Calendar_June_2026.xlsx');
        });

        renderCategories();
        updateDateRange();
    </script>
