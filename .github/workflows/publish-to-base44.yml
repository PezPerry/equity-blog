name: Publish Article to Base44

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - '!rns-news.html'
      - '!longreads/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect and publish new HTML articles
        env:
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
        run: |
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- '*.html' ':!longreads/' | grep -v 'rns-news.html' || true)

          if [ -z "$NEW_FILES" ]; then
            echo "No new HTML articles detected. Skipping."
            exit 0
          fi

          echo "$NEW_FILES" | while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            echo "========================================="
            echo "Processing: $FILE"

            export FILE

            python3 -c "
          import json, re, os

          filename = os.environ['FILE']
          slug = os.path.splitext(os.path.basename(filename))[0]
          github_url = f'https://pezperry.github.io/equity-blog/{filename}'

          with open(filename, 'r') as f:
              html = f.read()

          title_match = re.search(r'<title>([^|<]+)', html)
          title = title_match.group(1).strip() if title_match else slug

          excerpt_match = re.search(r'meta name=\"description\" content=\"([^\"]+)\"', html)
          excerpt = excerpt_match.group(1) if excerpt_match else ''

          kw_match = re.search(r'meta name=\"keywords\" content=\"([^\"]+)\"', html)
          keywords = kw_match.group(1).lower() if kw_match else ''

          text_only = re.sub(r'<[^>]+>', ' ', html)
          word_count = len(text_only.split())
          read_time = max(1, word_count // 200)

          all_text = f'{keywords} {title} {slug}'.lower()

          if re.search(r'(company.*(analysis|research)|earnings|results|rns|trading.update|annual.report|half.year|interim)', all_text):
              category = 'company_analysis'
          elif re.search(r'(trade.*(log|diary|journal)|day.trade|swing.trade|position.*(open|close|sold|bought)|entry.price|stop.loss)', all_text):
              category = 'day_trades'
          elif re.search(r'(oil|crude|brent|wti|gold|silver|copper|commodit|energy.*(price|market)|opec|strait.*hormuz)', all_text):
              category = 'commodities'
          elif re.search(r'(nasdaq|ftse|s.p.500|dow.jones|index|indices|market.+(react|move|rebound|crash|rally))', all_text):
              category = 'indices'
          elif re.search(r'(market.*(movement|reaction|update|today)|sector|geopolit|tariff|sanction|blockade|war|conflict|defence)', all_text):
              category = 'market_movements'
          elif re.search(r'(hous(e|ing)|property|mortgage|homebuilder|construction|persimmon|barratt|bellway|taylor.wimpey|vistry)', all_text):
              category = 'housing'
          elif re.search(r'(inflation|cpi|consumer.price|cost.of.living|stagflation)', all_text):
              category = 'inflation'
          elif re.search(r'(interest.rate|base.rate|bank.of.england|federal.reserve|boe|fed.rate|monetary.policy)', all_text):
              category = 'interest_rates'
          elif re.search(r'(currency|forex|gbp|usd|eur|dollar|pound|exchange.rate)', all_text):
              category = 'currencies'
          else:
              category = 'market_movements'

          iframe = f'<div style=\"width:100%;margin:0;padding:0;\"><iframe src=\"{github_url}\" style=\"width:100%;height:85vh;border:none;display:block;\" scrolling=\"yes\"></iframe></div>'

          from datetime import date
          post = {
              'title': title,
              'slug': slug,
              'category': category,
              'content': iframe,
              'excerpt': excerpt,
              'author': 'Mickey Perry',
              'publish_date': date.today().isoformat(),
              'read_time': read_time,
              'is_published': True
          }

          print(f'  Title:    {title}')
          print(f'  Category: {category}')
          print(f'  Slug:     {slug}')
          print(f'  Read:     {read_time} min')

          with open('/tmp/base44_payload.json', 'w') as f:
              json.dump(post, f)
          "

            HTTP_CODE=$(curl -s -o /tmp/base44_response.json -w "%{http_code}" \
              -X POST \
              -H "api_key: ${BASE44_API_KEY}" \
              -H "Content-Type: application/json" \
              -d @/tmp/base44_payload.json \
              "https://perky-equity-insight-hub.base44.app/api/entities/BlogPost")

            if [ "$HTTP_CODE" = "200" ]; then
              POST_ID=$(python3 -c "import json; print(json.load(open('/tmp/base44_response.json')).get('id','?'))")
              CATEGORY=$(python3 -c "import json; print(json.load(open('/tmp/base44_response.json')).get('category','?'))")
              echo "  ✅ Published to Base44 (ID: $POST_ID, Category: $CATEGORY)"
            else
              echo "  ❌ Failed (HTTP $HTTP_CODE)"
              cat /tmp/base44_response.json
              exit 1
            fi
          done
