        const events = rawData.split('\n').filter(line => line.trim()).map(line => {

            const dateObj = new Date(date);

        });
        const allCategories = [...new Set(events.map(e => e.category))].sort();
        let activeCategories = new Set(allCategories);
        let sortColumn = 'date';
        let sortDir = 'asc';
        let currentView = 'today';
        let currentDate = new Date();
        (function(){var now=new Date();var dd=String(now.getDate()).padStart(2,'0');var mm=String(now.getMonth()+1).padStart(2,'0');var yy=String(now.getFullYear()).slice(-2);document.getElementById('mastheadDate').textContent='FINANCIAL CALENDAR / '+dd+'.'+mm+'.'+yy;})();
        function getCategoryTag(category) {
            if (['AGM', 'EGM', 'GM'].includes(category)) return 'tag-agm';
            if (['Final Results', 'Interim Results', 'Q1 Results', 'Q4 Results'].includes(category)) return 'tag-results';
            if (['Final Dividend Payment Date', 'Interim Dividend Payment Date', 'Quarterly Dividend Payment Date', 'Special Dividend Payment Date'].includes(category)) return 'tag-dividend';
            if (category.includes('Ex-Dividend')) return 'tag-ex-dividend';
            if (category === 'Trading Announcement') return 'tag-trading';
            if (['Annual Report', 'Drilling Report'].includes(category)) return 'tag-report';
            if (category === 'Special Dividend Payment Date' || category === 'Special Ex-Dividend Date') return 'tag-special';
            return 'tag-report';
        }
        function parseDate(dateStr) {
            const parts = dateStr.split('-');
            return new Date(2026, new Date(parts[1]+' 1, 2026').getMonth(), parseInt(parts[0]));
        }
        function getFilteredEvents() {
            let filtered = events.filter(e => {
                if (!activeCategories.has(e.category)) return false;
                const search = document.getElementById('searchBox').value.toLowerCase();
                if (search && !e.company.toLowerCase().includes(search) && !e.ticker.toLowerCase().includes(search)) return false;
                const dfParts = document.getElementById('dateFrom').value.split('-');
                const dateFrom = new Date(parseInt(dfParts[0]), parseInt(dfParts[1])-1, parseInt(dfParts[2]));
                const dtParts = document.getElementById('dateTo').value.split('-');
                const dateTo = new Date(parseInt(dtParts[0]), parseInt(dtParts[1])-1, parseInt(dtParts[2]));
                if (e.dateObj < dateFrom || e.dateObj > dateTo) return false;
                return true;
            });
            filtered.sort((a, b) => {
                let aVal, bVal;
                if (sortColumn === 'date') { aVal = a.dateObj; bVal = b.dateObj; }
                else if (sortColumn === 'company') { aVal = a.company.toLowerCase(); bVal = b.company.toLowerCase(); }
                else if (sortColumn === 'ticker') { aVal = a.ticker.toLowerCase(); bVal = b.ticker.toLowerCase(); }
                else { aVal = a.category.toLowerCase(); bVal = b.category.toLowerCase(); }
                if (aVal < bVal) return sortDir === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortDir === 'asc' ? 1 : -1;
                return 0;
            });
            return filtered;
        }
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const countEl = document.getElementById('eventCount');
            const filtered = getFilteredEvents();
            countEl.textContent = filtered.length;
            if (filtered.length === 0) { tbody.innerHTML = ''; emptyState.style.display = 'block'; return; }
            emptyState.style.display = 'none';
            const groupByCategory = document.getElementById('groupByCategory').checked;
            if (groupByCategory) {
                const grouped = {};
                filtered.forEach(e => { if (!grouped[e.category]) grouped[e.category] = []; grouped[e.category].push(e); });
                tbody.innerHTML = '';
                let groupIndex = 0;
                Object.keys(grouped).sort().forEach(cat => {
                    groupIndex++;
                    const headerRow = document.createElement('tr');
                    headerRow.innerHTML = '<td colspan="4" style="padding:32px 0 16px 0;border:none;"><div class="category-group-header"><span class="number">0'+groupIndex+'</span><h2>'+cat+'</h2></div></td>';
                    tbody.appendChild(headerRow);
                    grouped[cat].forEach(e => {
                        const row = document.createElement('tr');
                        row.innerHTML = '<td>'+e.date+'</td><td class="ticker">'+e.ticker+'</td><td class="company-name">'+e.company+'</td><td><span class="category-tag '+getCategoryTag(e.category)+'">'+e.category+'</span></td>';
                        tbody.appendChild(row);
                    });
                });
            } else {
                tbody.innerHTML = filtered.map(e => '<tr><td>'+e.date+'</td><td class="ticker">'+e.ticker+'</td><td class="company-name">'+e.company+'</td><td><span class="category-tag '+getCategoryTag(e.category)+'">'+e.category+'</span></td></tr>').join('');
            }
        }
        function renderCategories() {
            const container = document.getElementById('categoryFilters');
            container.innerHTML = allCategories.map(cat => '<div class="chip active" data-category="'+cat+'">'+cat+'</div>').join('');
            container.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const cat = chip.dataset.category;
                    if (activeCategories.has(cat)) { activeCategories.delete(cat); chip.classList.remove('active'); }
                    else { activeCategories.add(cat); chip.classList.add('active'); }
                    renderTable();
                });
            });
        }
        function updateDateRange() {
            const dateFrom = document.getElementById('dateFrom');
            const dateTo = document.getElementById('dateTo');
            if (currentView === 'today') {
                const y = currentDate.getFullYear(); const m = String(currentDate.getMonth()+1).padStart(2,'0'); const d = String(currentDate.getDate()).padStart(2,'0');
                const dateStr = y+'-'+m+'-'+d; dateFrom.value = dateStr; dateTo.value = dateStr;
            } else if (currentView === 'week') {
                const start = new Date(currentDate); start.setDate(start.getDate()-start.getDay());
                const end = new Date(start); end.setDate(end.getDate()+6);
                dateFrom.value = start.toISOString().split('T')[0]; dateTo.value = end.toISOString().split('T')[0];
            } else if (currentView === 'month') { dateFrom.value = '2026-05-01'; dateTo.value = '2026-05-31'; }
            renderTable();
        }
        document.querySelectorAll('[data-view]').forEach(btn => {

            });

        document.getElementById('prevDay').addEventListener('click', () => { currentDate.setDate(currentDate.getDate()-1); updateDateRange(); });
        document.getElementById('nextDay').addEventListener('click', () => { currentDate.setDate(currentDate.getDate()+1); updateDateRange(); });
        document.getElementById('dateFrom').addEventListener('change', renderTable);

        document.getElementById('searchBox').addEventListener('input', renderTable);
        document.getElementById('groupByCategory').addEventListener('change', renderTable);
        document.querySelectorAll('th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const col = th.dataset.column;
                if (sortColumn === col) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
                else { sortColumn = col; sortDir = 'asc'; }
                document.querySelectorAll('th.sortable').forEach(h => { h.classList.remove('sort-asc','sort-desc'); });
                th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
                renderTable();
            });
        });
        function parseDateForCal(dateStr) {
            const parts = dateStr.split('-');
            const months = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
            return {y: parts[2], m: months[parts[1]], d: parts[0].padStart(2,'0')};
        }
        function generateICS(filtered, filename) {
            let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Financial Calendar//EN\r\nCALSCALE:GREGORIAN\r\n';
            filtered.forEach(e => {
                const dt = parseDateForCal(e.date); const dateVal = dt.y+dt.m+dt.d;
                const uid = dateVal+'-'+e.ticker+'-'+e.category.replace(/\s/g,'')+'@financialcalendar';
                ics += 'BEGIN:VEVENT\r\n'; ics += 'DTSTART;VALUE=DATE:'+dateVal+'\r\n'; ics += 'DTEND;VALUE=DATE:'+dateVal+'\r\n';
                ics += 'SUMMARY:'+e.ticker+' \u2014 '+e.category+'\r\n';
                ics += 'DESCRIPTION:'+e.company+' ('+e.ticker+') \u2014 '+e.category+'\\nDate: '+e.date+'\r\n';
                ics += 'UID:'+uid+'\r\n'; ics += 'END:VEVENT\r\n';
            });
            ics += 'END:VCALENDAR';
            const blob = new Blob([ics], {type:'text/calendar;charset=utf-8'});
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = filename; document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }
        function generateGoogleCSV(filtered) {
            let csv = 'Subject,Start Date,All Day Event,Description\r\n';
            filtered.forEach(e => {
                const dt = parseDateForCal(e.date); const startDate = dt.m+'/'+dt.d+'/'+dt.y;
                const subject = (e.ticker+' \u2014 '+e.category).replace(/"/g,'""');
                const desc = (e.company+' ('+e.ticker+') \u2014 '+e.category).replace(/"/g,'""');
                csv += '"'+subject+'","'+startDate+'","True","'+desc+'"\r\n';
            });
            const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
            const url = URL.createObjectURL(blob); const a = document.createElement('a');
            a.href = url; a.download = 'Financial_Calendar_Google_Calendar.csv'; document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        }
        document.getElementById('exportICS').addEventListener('click', () => {
            const filtered = getFilteredEvents();
            if (filtered.length === 0) { alert('No events to export. Adjust your filters.'); return; }
            generateICS(filtered, 'Financial_Calendar_iOS.ics');
        });
        document.getElementById('exportGoogle').addEventListener('click', () => {
            const filtered = getFilteredEvents();

        document.getElementById('exportOutlook').addEventListener('click', () => {
            const filtered = getFilteredEvents();

        });

        updateDateRange();
